services:
  app:
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        uv export --frozen --all-groups --no-hashes | uv pip install --system -r -
        alembic upgrade head
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    ports:
      - "5433:5432"

  redis:
    ports:
      - "6379:6379"
